<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Sharing System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Background Image */
            background:

            linear-gradient(rgba(10, 20, 40, 0.35), rgba(10, 20, 40, 0.35)),
            url("/static/bhot.jpg");;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            width: 450px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            color: white;
        }

        .icon {
            font-size: 55px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            margin-bottom: 30px;
            color: #dbeafe;
        }

        .upload-box {
            border: 2px dashed #38bdf8;
            padding: 30px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.08);
        }

        .upload-box h3 {
            margin-bottom: 15px;
            color: #ffffff;
        }

        .upload-box input[type="file"] {
            margin-top: 10px;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;

            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.4);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #cbd5e1;
        }
        .password-box {
    position: relative;
    width: 100%;
    margin-top: 15px;
}

.password-box input {
    width: 100%;
    padding: 14px;
    padding-right: 40px;
    border-radius: 12px;
    border: none;
    outline: none;

    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 14px;

    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
}

.password-box input::placeholder {
    color: #cbd5e1;
}

.toggle-pass {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #cbd5e1;
    font-size: 14px;
}

.password-box input:focus {
    border: 1px solid #00c6ff;
    box-shadow: 0 0 10px rgba(0,198,255,0.4);
}
    </style>
</head>
<body>

<div class="container">

    <div class="icon">🔐</div>

    <h1>Secure File Sharing</h1>

    <p>
        Upload your files safely with advanced encryption protection
    </p>

    <form method="POST" enctype="multipart/form-data">

        <div class="upload-box">
            <h3>Select Your File</h3>
            <input type="file" name="file" required>
        </div>
        <div class="password-box">
            <input type="password" name="password" id="uploadPassword" placeholder="🔐 Set download password" required>

            <span class="toggle-pass" onclick="toggleUploadPassword()">👁</span>
        </div>
        <br><br>
        <button type="submit">
            Upload & Encrypt
        </button>

    </form>

    <div class="footer-text">
        Your files are protected with secure encryption technology
    </div>

</div>
<script>
    function toggleUploadPassword() {
        var pass = document.getElementById("uploadPassword");
        if (pass.type === "password") {
            pass.type = "text";
        } else {
            pass.type = "password";
        }
    }
</script>
</body>
</html>
