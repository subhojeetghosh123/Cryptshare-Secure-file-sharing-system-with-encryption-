<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Download</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(rgba(10, 20, 40, 0.5), rgba(10, 20, 40, 0.5)),
                url("{{ url_for('static', filename='pass.jpg') }}");

            background-size: cover;
            background-position: center;
        }

        .box {
            width: 400px;
            padding: 40px;
            text-align: center;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);

            color: white;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #dbeafe;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-box {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;

            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,114,255,0.5);
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
        }

        .show-pass {
            font-size: 12px;
            color: #cbd5e1;
            cursor: pointer;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="icon">🔐</div>

    <h2>Secure Download</h2>
    <p>Enter password to access your file</p>

    <form method="POST">
        <input type="password" name="password" placeholder="Enter password" id="password" class="input-box" required>

        <span class="show-pass" onclick="togglePassword()">👁 Show Password</span>

        <button type="submit" class="btn">Unlock & Download</button>
    </form>

    {% if error %}
    <div class="error">❌ {{ error }}</div>
    {% endif %}

</div>

<script>
    function togglePassword() {
        var pass = document.getElementById("password");
        if (pass.type === "password") {
            pass.type = "text";
        } else {
            pass.type = "password";
        }
    }
</script>

</body>
</html>
